<script>

  function updateDates() {
    const startDate = new Date(startDateInput.value);
    const options = { day: 'numeric', month: 'numeric' };
    for (let i = 0; i < 7; i++) {
      let d = new Date(startDate);
      d.setDate(startDate.getDate() + i);
      dateRow.cells[3 + i].textContent = d.toLocaleDateString('en-GB', options) + " " + weekdays[d.getDay()];

  }
  startDateInput.addEventListener("change", updateDates);

function recalcCategoryTotals() {
  const tbody = document.querySelector("#foodTable tbody");
  const rows = Array.from(tbody.querySelectorAll("tr"));

  let currentCategoryRow = null;
  let categoryTotals = new Array(28).fill(0);

  rows.forEach(row => {
    if (row.classList.contains("categoryRow")) {
      // 如果之前有種類 → 把累加結果顯示到該種類行
      if (currentCategoryRow) {
        const inputs = currentCategoryRow.querySelectorAll("td input");
        categoryTotals.forEach((val, i) => {
          inputs[i + 3].value = val; // R=第4格開始
        });
      }
      // 重置
      currentCategoryRow = row;
      categoryTotals = new Array(28).fill(0);
    } else {
      // 食品行 → 累加
      const inputs = row.querySelectorAll("td input");
      if (inputs.length > 0) {
        for (let day = 0; day < 7; day++) {
          const baseIndex = 1 + day * 4; // ← 修正：Day1 R=第4格
          categoryTotals[day * 4 + 0] += parseFloat(inputs[baseIndex]?.value) || 0; // R
          categoryTotals[day * 4 + 1] += parseFloat(inputs[baseIndex+1]?.value) || 0; // T
          categoryTotals[day * 4 + 2] += parseFloat(inputs[baseIndex+2]?.value) || 0; // W
          categoryTotals[day * 4 + 3] += parseFloat(inputs[baseIndex+3]?.value) || 0; // E
        }
      }
    }
  });

  // 最尾一個種類 → 顯示累加結果
  if (currentCategoryRow) {
    const inputs = currentCategoryRow.querySelectorAll("td input");
    categoryTotals.forEach((val, i) => {
      inputs[i + 3].value = val; // R=第4格開始
    });
  }
}

function recalcTotals() {
  const tbody = document.querySelector("#foodTable tbody");
  const totalRow = document.getElementById("totalRow");
  const totals = new Array(28).fill(0); // 全表 TOTAL
  let currentCategoryRow = null;
  let categoryTotals = new Array(28).fill(0);

  tbody.querySelectorAll("tr").forEach(row => {
    if (row.classList.contains("categoryRow")) {
      // 如果之前有種類 → 把累加結果顯示到該種類行
      if (currentCategoryRow) {
        const inputs = currentCategoryRow.querySelectorAll("td input");
        categoryTotals.forEach((val, i) => {
          inputs[i + 3].value = val; // R=第4格開始
        });
      }
      // 重置
      currentCategoryRow = row;
      categoryTotals = new Array(28).fill(0);
    } else {
      // 食品行 → 累加到 TOTAL + 當前種類
      const inputs = row.querySelectorAll("td input, select");
      if (inputs.length > 0) {
        for (let day = 0; day < 7; day++) {
          const baseIndex = 3 + day * 4; // Day1 R=第4格
          const r = parseFloat(inputs[baseIndex]?.value) || 0;
          const t = parseFloat(inputs[baseIndex+1]?.value) || 0;
          const w = parseFloat(inputs[baseIndex+2]?.value) || 0;
          const e = parseFloat(inputs[baseIndex+3]?.value) || 0;

          totals[day*4+0] += r;
          totals[day*4+1] += t;
          totals[day*4+2] += w;
          totals[day*4+3] += e;

          categoryTotals[day*4+0] += r;
          categoryTotals[day*4+1] += t;
          categoryTotals[day*4+2] += w;
          categoryTotals[day*4+3] += e;
        }
      }
    }
  });

  // 最尾一個種類 → 顯示累加結果
  if (currentCategoryRow) {
    const inputs = currentCategoryRow.querySelectorAll("td input");
    categoryTotals.forEach((val, i) => {
      inputs[i + 3].value = val;
    });
  }

  // 更新 TOTAL 行：第 2 格開始對應 R、第 3 格 T、第 4 格 W、第 5 格 E
  const totalCells = totalRow.querySelectorAll("td");
  for (let i = 0; i < totals.length; i++) {
    totalCells[i+1].textContent = totals[i];
  }
}

// 右鍵選單功能（放在最尾端）
const contextMenu = document.getElementById("contextMenu");
const tbody = document.querySelector("#foodTable tbody");
let contextRow = null;

tbody.addEventListener("contextmenu", function(e) {
  e.preventDefault();
  const row = e.target.closest("tr");
  if (!row) return;   // 允許所有行，包括 categoryRow
  contextRow = row;
  contextMenu.style.top = e.pageY + "px";
  contextMenu.style.left = e.pageX + "px";
  contextMenu.style.display = "block";
});

document.addEventListener("click", function() {
  contextMenu.style.display = "none";
});

function moveUp() {
  if (!contextRow) return;
  const prev = contextRow.previousElementSibling;
  if (prev) {
    tbody.insertBefore(contextRow, prev);
  }
}

function moveDown() {
  if (!contextRow) return;
  const next = contextRow.nextElementSibling;
  if (next) {
    tbody.insertBefore(next, contextRow);
  }
}

function deleteRow() {
  if (!contextRow) return;
  tbody.removeChild(contextRow);
  contextRow = null;
}

// 匯出 PDF (直向 A4，左右留 5mm)
async function exportPDF() {
  const { jsPDF } = window.jspdf;
  const pdf = new jsPDF("portrait", "mm", "a4"); // portrait 直向
  const table = document.getElementById("foodTable");
 
// 從日期選擇器抓取日期
  const dateInput = document.getElementById("startDate").value; // 格式: YYYY-MM-DD
  let fileDate = "NoDate";
  if (dateInput) {
    const parts = dateInput.split("-");
    // 轉成 26_6_2026 格式
    fileDate = `${parseInt(parts[2])}_${parseInt(parts[1])}_${parts[0]}`;
  }
  const canvas = await html2canvas(table, { scale: 1 });
  const imgData = canvas.toDataURL("image/jpeg", 0.7);

  // A4 尺寸
  const pageWidth = pdf.internal.pageSize.getWidth();
  const pageHeight = pdf.internal.pageSize.getHeight();

  // 設定左右邊界 5mm
  const margin = 5;
  const imgWidth = pageWidth - margin * 2;
  const imgHeight = (canvas.height * imgWidth) / canvas.width;

  // 如果高度超過 A4，縮到 A4 高度
  const finalHeight = imgHeight > pageHeight - margin * 2 ? pageHeight - margin * 2 : imgHeight;

  pdf.addImage(imgData, "PNG", margin, margin, imgWidth, finalHeight);
  pdf.save(fileDate + "Food order.pdf");
}

function recalcActualOrder() {

  const actualRow = document.getElementById("actualRow");
  const totals = new Array(7).fill(0);

  tbody.querySelectorAll("tr").forEach(row => {
    const inputs = row.querySelectorAll("input, select"); // 包括 select
    if (inputs.length > 0) {
      const price = parseFloat(inputs[1]?.value) || 0; // 第二格係 Price select
      for (let day = 0; day < 7; day++) {
        const rIndex = 3 + day * 4;
        const rVal = parseFloat(inputs[rIndex]?.value) || 0;
        totals[day] += rVal * price;
      }
    }
  });

      <td><input type="text" value="${catName}" class="wide"></td>
      <td><input type="text" class="narrow"></td>
      <td><input type="text" class="narrow"></td>
      ${Array.from({length: 28}, () => `<td><input type="text" class="narrow" readonly></td>`).join("")}
    `;
    tbody.appendChild(categoryRow);

    // 食物行
    categoryFoods[catName].forEach((foodName, idx) => {
      const foodRow = document.createElement("tr");
      foodRow.innerHTML = `
        <td><input type="text" value="${foodName}" class="wide"></td>
        <td>
          <select class="priceSelect">
            ${Array.from({length: 101}, (_, i) => `<option value="${i}">${i}</option>`).join("")}
          </select>
        </td>
        <td>
          <select class="shelfSelect">
            <option value="P+1">P+1</option>
            <option value="P+2">P+2</option>
            <option value="P+3">P+3</option>
            <option value="P+4">P+4</option>
            <option value="P+5">P+5</option>
            <option value="N/A">N/A</option>
          </select>
        </td>
        ${Array.from({length: 28}, () => `<td><input type="text" class="narrow"></td>`).join("")}
      `;
      tbody.appendChild(foodRow);

      // 設定 Shelf life 初始值
      const shelfSelect = foodRow.querySelector(".shelfSelect");
      shelfSelect.value = shelfLifeDefaults[catName][idx];

      // 設定 Price 初始值
      const priceSelect = foodRow.querySelector(".priceSelect");
      priceSelect.value = priceDefaults[catName][idx];
    });
  });
}

window.onload = function() {
  initTable();
};
document.getElementById("addRow").addEventListener("click", function() {
  if (currentRow) {
    const newRow = document.createElement("tr");
    newRow.innerHTML = `
      <td><input type="text" class="wide"></td>
      <td><select class="priceSelect">
        ${Array.from({length:101},(_,i)=>`<option value="${i}">${i}</option>`).join("")}
      </select></td>
      <td><select class="shelfSelect">
        <option value="P+1">P+1</option>
        <option value="P+2">P+2</option>
        <option value="P+3">P+3</option>
        <option value="P+4">P+4</option>
        <option value="P+5">P+5</option>
        <option value="N/A">N/A</option>
      </select></td>
      <td><input type="text" class="narrow"></td>
      <td><input type="text" class="narrow"></td>
      <td><input type="text" class="narrow"></td>
    `;
    currentRow.parentNode.insertBefore(newRow, currentRow.nextSibling);
    hideContextMenu();
  }
});


</script>
